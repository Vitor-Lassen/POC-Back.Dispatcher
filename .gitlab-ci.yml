image: docker:latest
services:
  - docker:dind

variables:
  DOCKER_DRIVER: overlay

stages:
  - build
  
docker-build:
  stage: build
  script:
  - docker build -f Dockerfile --iidfile imageid.txt -t registry.heroku.com/run-simulados-messaging-dev/dispatcher .
  - docker login --username=_ --password=$HEROKU_ACCOUNT_KEY registry.heroku.com
  - docker push registry.heroku.com/run-simulados-messaging-dev/dispatcher
  - apk add --no-cache curl
  - echo "Docker Image ID is $(cat imageid.txt)"
  - |-
    curl -X PATCH https://api.heroku.com/apps/run-simulados-messaging-dev/formation --header "Content-Type: application/json" --header "Accept: application/vnd.heroku+json; version=3.docker-releases" --header "Authorization: Bearer $HEROKU_ACCOUNT_KEY" --data '{ "updates": [ { "type": "web", "docker_image": "'$(cat imageid.txt)'" } ] }'